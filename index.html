<div class="container">

<h1>Nuvio Installer</h1>

<p>Follow these steps to install Nuvio on your iPhone or iPad</p>

<p>Install AltStore</p>

<a href="https://altstore.io">
<button class="altstore">Install AltStore</button>
</a>

After downloading the file, open AltStore → press + → select the Nuvio IPA
</p>
